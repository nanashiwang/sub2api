name: Cleanup old Actions artifacts

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/cleanup-actions-artifacts.yml"
  schedule:
    - cron: "17 10 * * 0"
      timezone: "Asia/Singapore"

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete artifacts older than 7 days
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RETENTION_DAYS: "7"
        run: |
          set -euo pipefail

          cutoff_epoch=$(date -u -d "${RETENTION_DAYS} days ago" +%s)
          deleted=0
          freed=0

          while IFS=$'\t' read -r artifact_id created_at artifact_name size_bytes; do
            [[ -z "${artifact_id:-}" ]] && continue
            created_epoch=$(date -u -d "$created_at" +%s)

            if (( created_epoch < cutoff_epoch )); then
              echo "Deleting artifact id=$artifact_id name=$artifact_name created_at=$created_at size=$size_bytes"
              gh api --method DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2026-03-10" \
                "/repos/${REPOSITORY}/actions/artifacts/${artifact_id}"
              deleted=$((deleted + 1))
              freed=$((freed + size_bytes))
            fi
          done < <(
            gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "/repos/${REPOSITORY}/actions/artifacts?per_page=100" \
              --jq '.artifacts[] | [.id, .created_at, .name, .size_in_bytes] | @tsv'
          )

          echo "Deleted ${deleted} artifacts; requested release of ${freed} bytes."
